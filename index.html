<style>
/* ===== Shared design tokens (copied from template.html — do not diverge) ===== */
:root {
  --text-primary: #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary: #76746E;
  --success: #6BE3A4;
  --warning: #F2C063;
  --danger:  #FF6B6B;
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: #050506;
  color: var(--text-secondary);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  -webkit-text-size-adjust: 100%;
}
body {
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
  padding: max(28px, env(safe-area-inset-top)) 20px 60px;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(circle at 82% 14%, rgba(224, 118, 88, 0.16), transparent 45%),
    radial-gradient(circle at 18% 90%, rgba(180, 180, 200, 0.06), transparent 50%);
  filter: blur(40px);
  pointer-events: none;
  z-index: -2;
  animation: drift 36s ease-in-out infinite alternate;
}
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px);
  background-size: 3px 3px;
  pointer-events: none;
  z-index: -1;
}
@keyframes drift {
  0%   { transform: translate3d(0,0,0); }
  100% { transform: translate3d(-22px, 14px, 0); }
}

.page { max-width: 1100px; margin: 0 auto; }

.section { margin-top: 8px; }
.section-title {
  font-size: 10.5px; font-weight: 700;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--text-tertiary);
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 12px;
}
.section-title::before {
  content: ''; width: 18px; height: 1px;
  background: var(--text-tertiary); opacity: 0.6;
}
.section-title::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(90deg, rgba(255,255,255,0.08), transparent);
}

.gm-card {
  position: relative;
  background: rgba(255, 255, 255, 0.04);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 14px;
  backdrop-filter: blur(24px) saturate(1.2);
  -webkit-backdrop-filter: blur(24px) saturate(1.2);
  box-shadow: 0 12px 40px rgba(0,0,0,0.45);
  overflow: hidden;
}

.stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 12px;
}
.stat {
  background: rgba(255,255,255,0.035);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px; padding: 14px;
  text-decoration: none; color: inherit; display: block;
  transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
}
.stat:hover { transform: translateY(-2px); border-color: rgba(255,255,255,0.14); }
.stat-num {
  font-size: 26px; font-weight: 700;
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.03em; color: var(--text-primary); line-height: 1;
  font-family: var(--font-mono);
}
.stat-label {
  margin-top: 6px;
  font-size: 10.5px; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--text-tertiary);
}
.stat-sub {
  margin-top: 4px;
  font-size: 10px; color: var(--text-tertiary);
}
/* Status tints — driven off --success/--warning/--danger only, no new colors. */
.stat.stat-good { border-color: rgba(107,227,164,0.35); background: rgba(107,227,164,0.07); }
.stat.stat-warn { border-color: rgba(242,192,99,0.35); background: rgba(242,192,99,0.07); }
.stat.stat-bad  { border-color: rgba(255,107,107,0.35); background: rgba(255,107,107,0.07); }
.stat.stat-good .stat-num { color: var(--success); }
.stat.stat-warn .stat-num { color: var(--warning); }
.stat.stat-bad  .stat-num { color: var(--danger); }

/* ===== Home-page-specific bits ===== */
.home-welcome {
  font-family: Georgia, 'Iowan Old Style', 'Palatino Linotype', 'Book Antiqua', serif;
  font-style: italic;
  font-size: 26px; color: #6B8E23;
  letter-spacing: 0.01em; margin: 0 0 22px;
}
@media (max-width: 480px) { .home-welcome { font-size: 20px; } }
.home-clock-row {
  display: flex; flex-wrap: wrap; align-items: center;
  justify-content: space-between; gap: 20px;
}
.home-clock-block { min-width: 200px; }
.home-clock {
  font-family: var(--font-mono); font-size: 44px; font-weight: 700;
  color: var(--text-primary); letter-spacing: -0.02em; line-height: 1;
  font-variant-numeric: tabular-nums;
}
.home-date {
  margin-top: 8px; font-size: 13px; color: var(--text-secondary);
}
.home-quote-block {
  flex: 1; min-width: 220px; max-width: 440px;
  padding-left: 20px; border-left: 1px solid rgba(255,255,255,0.08);
}
.home-quote {
  font-size: 14px; font-style: italic; color: var(--text-secondary); line-height: 1.5;
}
.home-quote-author {
  margin-top: 8px; font-size: 10.5px; font-weight: 700;
  letter-spacing: 0.10em; text-transform: uppercase; color: var(--text-tertiary);
}
.home-bible { margin-top: 14px; padding-top: 14px; border-top: 1px solid rgba(255,255,255,0.08); }

/* Weather — minimalist: icon + big temp + condition + high/low, plus a
   small sparkline of today's hourly temps (no axis labels, no libraries —
   same hand-drawn SVG pattern as health.html's sleep chart). */
.home-weather { margin-top: 16px; padding-top: 14px; border-top: 1px solid rgba(255,255,255,0.08); }
.home-weather-row { display: flex; align-items: center; gap: 10px; }
.home-weather-icon { font-size: 28px; line-height: 1; flex-shrink: 0; }
.home-weather-temp {
  font-size: 34px; font-weight: 600; color: var(--text-primary);
  letter-spacing: -0.02em; line-height: 1; font-variant-numeric: tabular-nums;
}
.home-weather-info { flex: 1; min-width: 0; }
.home-weather-cond { font-size: 12.5px; color: var(--text-secondary); }
.home-weather-sub { margin-top: 2px; font-size: 10.5px; color: var(--text-tertiary); }
.home-weather-refresh {
  width: 30px; height: 30px; flex-shrink: 0; border-radius: 9px;
  border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.03);
  color: var(--text-secondary); font-size: 15px; line-height: 1; cursor: pointer;
  transition: background 0.15s, color 0.15s;
}
.home-weather-refresh:hover { background: rgba(255,255,255,0.07); color: var(--text-primary); }
.home-weather-refresh.spinning { animation: home-weather-spin 0.6s linear; }
@keyframes home-weather-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
.home-weather-chart-svg { width: 100%; height: 94px; display: block; margin-top: 10px; overflow: visible; }
.home-weather-chart-svg.hidden { display: none; }
.home-weather-chart-hour { font-size: 9px; font-family: var(--font-mono); fill: var(--text-tertiary); }
.home-weather-chart-value { font-size: 11px; font-weight: 700; font-family: var(--font-mono); fill: var(--text-primary); }
.home-weather-chart-value.now { fill: #6B8E23; }
.home-weather-chart-precip { font-size: 9px; font-family: var(--font-mono); fill: var(--text-tertiary); }
.home-weather-chart-line { fill: none; stroke: #6B8E23; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; opacity: 0.7; }
.home-weather-chart-dot { fill: #6B8E23; opacity: 0.7; }
.home-weather-chart-dot.now { opacity: 1; }

@media (max-width: 560px) {
  .home-clock { font-size: 34px; }
  .home-quote-block { border-left: none; border-top: 1px solid rgba(255,255,255,0.08); padding-left: 0; padding-top: 16px; }
}
@media (max-width: 480px) {
  body { padding: max(20px, env(safe-area-inset-top)) 14px 50px; }
  .gm-card { padding: 16px; }
}
</style>
</head>
<body>

<script>
(function () {
  'use strict';
  const $ = (id) => document.getElementById(id);

  /* ============================================================
     CLOCK + DATE
     ============================================================ */
  function updateClock() {
    const now = new Date();
    const hh = String(now.getHours()).padStart(2, '0');
    const mm = String(now.getMinutes()).padStart(2, '0');
    const ss = String(now.getSeconds()).padStart(2, '0');
    $('homeClock').textContent = hh + ':' + mm + ':' + ss;
    const dateStr = now.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
    $('homeDate').textContent = dateStr.charAt(0).toUpperCase() + dateStr.slice(1);
  }
  updateClock();
  setInterval(updateClock, 1000);

  const WEATHER_LAT = -32.8563501, WEATHER_LON = -61.148729;
  const WEATHER_CACHE_KEY = 'home:weather_cache';
  const WEATHER_REFRESH_MS = 60 * 60 * 1000; // auto-refresh every hour

  const WMO_DESC = {

  // Day icons; clear/mostly-clear swap to a moon at night (is_day===0).

    71: '🌨️', 73: '❄️', 75: '❄️', 77: '❄️',

  const WMO_ICON_NIGHT = { 0: '🌙', 1: '🌙', 2: '☁️' }; // other codes look the same at night

  function renderWeather(data) {
    if (!data || data.temp == null) return;
    $('weatherTemp').textContent = Math.round(data.temp) + '°';
    $('weatherCond').textContent = WMO_DESC[data.code] != null ? WMO_DESC[data.code] : '—';
    const icons = data.isDay === 0 ? WMO_ICON_NIGHT : WMO_ICON_DAY;
    $('weatherIcon').textContent = icons[data.code] != null ? icons[data.code] : (WMO_ICON_DAY[data.code] || '🌡️');
    const parts = [];
    if (data.max != null && data.min != null) parts.push('Máx ' + Math.round(data.max) + '° · Mín ' + Math.round(data.min) + '°');
    if (data.feels != null) parts.push('Sensación ' + Math.round(data.feels) + '°');
    $('weatherSub').textContent = parts.join(' · ');
    renderWeatherChart(data.hourly);
  }

  // Hourly strip: hour label on top, temp value + line in the middle,
  // precipitation chance on the bottom — same idea as a phone weather
  // app's hourly row, hand-drawn as one small SVG (no chart library).
  // Only a handful of hours are sampled (not all 24) so the labels have
  // room to breathe; the sampled hour closest to right now is highlighted.
  const WEATHER_CHART_HOURS = [0, 4, 8, 12, 16, 20];

  function renderWeatherChart(hourly) {
    const svg = $('weatherChartSvg');
    if (!hourly || !hourly.temps || hourly.temps.length < 2) { svg.classList.add('hidden'); svg.innerHTML = ''; return; }
    svg.classList.remove('hidden');

    const idxs = WEATHER_CHART_HOURS.filter(i => i < hourly.temps.length);
    const temps = idxs.map(i => hourly.temps[i]);
    const precip = idxs.map(i => (hourly.precip ? hourly.precip[i] : null));
    const n = idxs.length;
    const nowIdx = Math.max(0, Math.min(hourly.temps.length - 1, hourly.nowIndex));
    // Which SAMPLED point is closest to the real current hour.
    let nowSample = 0, bestDiff = Infinity;
    idxs.forEach((hourIdx, i) => { const d = Math.abs(hourIdx - nowIdx); if (d < bestDiff) { bestDiff = d; nowSample = i; } });

    const W = svg.getBoundingClientRect().width || 300, H = 94;
    svg.setAttribute('viewBox', '0 0 ' + W.toFixed(1) + ' ' + H);
    const hourY = 9, valueY = 26, curveTop = 32, curveBottom = 64, precipY = 86;
    const min = Math.min.apply(null, temps), max = Math.max.apply(null, temps);
    const range = (max - min) || 1;
    const xAt = (i) => n === 1 ? W / 2 : (W * i) / (n - 1);
    const yAt = (v) => curveTop + (curveBottom - curveTop) * (1 - (v - min) / range);

    let d = '';
    temps.forEach((v, i) => { d += (i === 0 ? 'M ' : ' L ') + xAt(i).toFixed(1) + ' ' + yAt(v).toFixed(1); });
    let html = '<path class="home-weather-chart-line" d="' + d + '"></path>';

    idxs.forEach((hourIdx, i) => {
      const x = xAt(i).toFixed(1);
      const isNow = i === nowSample;
      html += '<text class="home-weather-chart-hour" x="' + x + '" y="' + hourY + '" text-anchor="middle">' + String(hourIdx).padStart(2, '0') + ':00</text>';
      html += '<text class="home-weather-chart-value' + (isNow ? ' now' : '') + '" x="' + x + '" y="' + valueY + '" text-anchor="middle">' + Math.round(temps[i]) + '°</text>';
      html += '<circle class="home-weather-chart-dot' + (isNow ? ' now' : '') + '" cx="' + x + '" cy="' + yAt(temps[i]).toFixed(1) + '" r="' + (isNow ? 3.2 : 2.2) + '"></circle>';
      if (precip[i] != null) {
        html += '<text class="home-weather-chart-precip" x="' + x + '" y="' + precipY + '" text-anchor="middle">' + Math.round(precip[i]) + '%</text>';
      }
    });
    svg.innerHTML = html;
  }

  function loadWeatherCache() {
    try { return JSON.parse(localStorage.getItem(WEATHER_CACHE_KEY)); } catch (e) { return null; }
  }
  function saveWeatherCache(data) {
    try { localStorage.setItem(WEATHER_CACHE_KEY, JSON.stringify(Object.assign({}, data, { ts: Date.now() }))); } catch (e) {}
  }
  async function fetchWeather() {
    const btn = $('weatherRefreshBtn');
    if (btn) btn.classList.add('spinning');
    try {
      const url = 'https://api.open-meteo.com/v1/forecast?latitude=' + WEATHER_LAT + '&longitude=' + WEATHER_LON +
        '&current=temperature_2m,apparent_temperature,weather_code,is_day' +
        '&hourly=temperature_2m,precipitation_probability&forecast_days=1' +
        '&daily=temperature_2m_max,temperature_2m_min&timezone=auto';
      const res = await fetch(url);
      const json = await res.json();
      const nowIndex = json.current && json.current.time && json.hourly && json.hourly.time
        ? json.hourly.time.indexOf(json.current.time.slice(0, 13) + ':00')
        : new Date().getHours();
      const data = {
        temp: json.current ? json.current.temperature_2m : null,
        feels: json.current ? json.current.apparent_temperature : null,
        code: json.current ? json.current.weather_code : null,
        isDay: json.current ? json.current.is_day : 1,
        max: json.daily && json.daily.temperature_2m_max ? json.daily.temperature_2m_max[0] : null,
        min: json.daily && json.daily.temperature_2m_min ? json.daily.temperature_2m_min[0] : null,
        hourly: json.hourly && json.hourly.temperature_2m ? {
          temps: json.hourly.temperature_2m,
          precip: json.hourly.precipitation_probability || null,
          nowIndex: nowIndex < 0 ? new Date().getHours() : nowIndex
        } : null,
      };
      renderWeather(data);
      saveWeatherCache(data);
    } catch (e) {
      const cached = loadWeatherCache();
      if (cached) renderWeather(cached);
      else $('weatherCond').textContent = 'Sin conexión';
    } finally {
      if (btn) setTimeout(() => btn.classList.remove('spinning'), 600);
    }
  }
  // Show cached weather instantly (no flash of "—"), then always fetch fresh.
  const cachedWeather = loadWeatherCache();
  if (cachedWeather) renderWeather(cachedWeather);
  fetchWeather();
  setInterval(fetchWeather, WEATHER_REFRESH_MS);
  $('weatherRefreshBtn').addEventListener('click', fetchWeather);

  /* ============================================================
     SHARED DATE HELPERS — same formulas as topbar.js / health.html
     ============================================================ */
  function pad2(n) { return String(n).padStart(2, '0'); }
  function calendarDateKey(d) {
    d = d || new Date();
    return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate());
  }
  // Goals' day rolls over at 6 AM, not midnight — exact replica of
  // topbar.js activeDateKey().
  function activeDateKey() {
    const now = new Date();
    const d = new Date(now);
    if (now.getHours() < 6) d.setDate(d.getDate() - 1);
    return calendarDateKey(d);
  }

  function setStat(id, text, status, subText) {
    const el = $(id);
    el.className = 'stat' + (status ? ' stat-' + status : '');
    $(id + 'Num').textContent = text;
    if (subText !== undefined) { const sub = $(id + 'Sub'); if (sub) sub.textContent = subText; }
  }

  /* ============================================================
     AGUA — exact replica of topbar.js getWaterProgress() + classifyStatus()
     ============================================================ */
  function getWaterProgress() {
    let state = null;
    try { state = JSON.parse(localStorage.getItem('po_water_v1')); } catch (e) {}
    if (!state) return { done: 0, total: 0 };
    const todayKey = calendarDateKey();
    const done = (state.logs || {})[todayKey] || 0;
    const p = state.profile || { weightKg: 75 };
    const wKg = state.weightUnit === 'lb' ? (p.weightKg || 0) / 2.20462 : (p.weightKg || 0);
    const base = wKg * 35;
    const exercise = (p.activityHrsPerWeek || 0) / 7 * 500;
    const subs = (state.substances || []).reduce((s, x) => {
      const dose = (x && x.dose != null ? x.dose : (x && x.defaultDose)) || 0;
      return s + Math.max(0, dose * ((x && x.mlPerUnit) || 0));
    }, 0);
    let adjust = 0;
    if (p.sex === 'm') adjust += 200;
    if ((p.age || 0) >= 50) adjust += 100;
    const totalMl = base + exercise + subs + adjust;
    let unitVol;
    if (state.unit === 'glass') unitVol = state.glassMl || 250;
    else if (state.unit === 'oz') unitVol = 30;
    else if (state.unit === 'ml') unitVol = 1;
    else unitVol = state.bottleMl || 500;
    const total = Math.max(1, Math.ceil(totalMl / unitVol));
    return { done, total };
  }
  function classifyWaterStatus(done, total) {
    if (total === 0) return 'idle';
    if (done >= total) return 'good';
    if (done >= total * 0.5) return 'warn';
    const h = new Date().getHours();
    if (h >= 18 && done < total * 0.5) return 'miss';
    return 'warn';
  }
  function renderWaterStat() {
    const w = getWaterProgress();
    const kind = classifyWaterStatus(w.done, w.total);
    const status = kind === 'good' ? 'good' : kind === 'miss' ? 'bad' : kind === 'warn' ? 'warn' : null;
    setStat('statWater', (w.total ? w.done + '/' + w.total : '0/0'), status);
  }

  /* ============================================================
     SUEÑO — exact replica of health.html dateKey()/durationHours()
     ============================================================ */
  function minutesSinceMidnight(hhmm) {
    if (!hhmm) return null;
    const parts = hhmm.split(':').map(Number);
    const h = parts[0], m = parts[1];
    if (isNaN(h) || isNaN(m)) return null;
    return h * 60 + m;
  }
  function durationHours(bedTime, wakeTime) {
    const b = minutesSinceMidnight(bedTime), w = minutesSinceMidnight(wakeTime);
    if (b == null || w == null) return null;
    let diff = w - b;
    if (diff <= 0) diff += 24 * 60;
    return diff / 60;
  }
  function renderSleepStat() {
    let entries = [];
    try { const v = JSON.parse(localStorage.getItem('sleepEntries')); if (Array.isArray(v)) entries = v; } catch (e) {}
    if (!entries.length) { setStat('statSleep', '—', null, ''); return; }

    const todayKey = calendarDateKey();
    let entry = entries.find(e => e.date === todayKey);
    let isLastNight = false;
    if (!entry) {
      entry = entries.slice().sort((a, b) => (a.date < b.date ? 1 : -1))[0];
      isLastNight = true;
    }
    const hours = entry ? durationHours(entry.bedTime, entry.wakeTime) : null;
    if (hours == null) { setStat('statSleep', '—', null, ''); return; }

    const status = hours >= 7 ? 'good' : hours >= 6 ? 'warn' : 'bad';
    setStat('statSleep', hours.toFixed(1) + 'h', status, isLastNight ? '(anoche)' : '');
  }

  /* ============================================================
     GOALS DE HOY — exact replica of topbar.js getGoalsProgress()
     ============================================================ */
  function renderGoalsStat() {
    const key = 'goals:' + activeDateKey();
    let goals = [];
    try { goals = JSON.parse(localStorage.getItem(key)) || []; } catch (e) {}
    const total = Array.isArray(goals) ? goals.length : 0;
    const done = total ? goals.filter(g => g && g.done).length : 0;
    const status = total === 0 ? null : (done === total ? 'good' : (done > 0 ? 'warn' : null));
    setStat('statGoals', done + '/' + total, status);
  }

  /* ============================================================
     CALORÍAS — replicates nutrition.html's todaysLog()/macrosFor()
     (entries store {foodId, qty} items, not a raw kcal field, so
     kcal has to be looked up per-food same as nutrition.html does)
     plus health.html's caloriesBurnedEntries.
     UI_AUDIT.md CRÍTICO #1: this used to read the dead 'burned:YYYY-MM-DD'
     key, which health.html stopped writing after migrating to
     'caloriesBurnedEntries' — burned was silently always 0, and this
     stat never fell back to '—' like every sibling stat does when data
     is missing. Now reads the real key, mirroring nutrition.html's
     getBurnedFor() (nutrition.html:607-614): no burned entry logged
     for today → treat the whole balance as unknown and show '—',
     same as nutrition.html's Calorie Balance ring does, instead of
     silently assuming 0 burned.
     ============================================================ */
  function kcalForItem(foods, foodId, qty) {
    const f = foods.find(x => x.id === foodId);
    if (!f) return 0;
    const scale = f.unit === 'unit' ? qty : qty / 100;
    return (f.kcal || 0) * scale;
  }
  function getBurnedForToday() {
    let entries = [];
    try { entries = JSON.parse(localStorage.getItem('caloriesBurnedEntries')) || []; } catch (e) {}
    if (!Array.isArray(entries) || !entries.length) return null;
    const todayKey = calendarDateKey();
    const dayEntries = entries.filter(en => en && en.date === todayKey);
    if (!dayEntries.length) return null;
    return dayEntries.reduce((sum, en) => sum + (Number(en.kcal) || 0), 0);
  }
  function renderCaloriesStat() {
    let log = [], foods = [], goals = null;
    try { log = JSON.parse(localStorage.getItem('nut:log')) || []; } catch (e) {}
    try { foods = JSON.parse(localStorage.getItem('nut:foods')) || []; } catch (e) {}
    try { goals = JSON.parse(localStorage.getItem('nut:goals')); } catch (e) {}
    const goalKcal = (goals && goals.kcal) || 2200; // same fallback as nutrition.html's DEFAULT_GOALS.kcal

    const burned = getBurnedForToday();
    if (burned == null) { setStat('statCalories', '—', null); return; }

    const midnight = new Date(); midnight.setHours(0, 0, 0, 0);
    const todaysEntries = log.filter(l => l.ts >= midnight.getTime());
    let consumed = 0;
    todaysEntries.forEach(entry => {
      (entry.items || []).forEach(it => { consumed += kcalForItem(foods, it.foodId, it.qty); });
    });

    const net = Math.round(consumed - burned);
    const ratio = goalKcal > 0 ? net / goalKcal : 0;
    const hour = new Date().getHours();
    let status;
    if (ratio >= 0.9 && ratio <= 1.1) status = 'good';
    else if (ratio > 1.25) status = 'bad';
    else if (ratio < 0.5 && hour >= 20) status = 'bad';
    else status = 'warn';

    setStat('statCalories', net + ' / ' + goalKcal + ' kcal', status);
  }

  /* ============================================================
     ACTIVIDAD FÍSICA — exact replica of gym.html's log shape
     (state.logs[exerciseId] = [{date, weight, reps}, ...])
     ============================================================ */
  function renderGymStat() {
    let state = null;
    try { state = JSON.parse(localStorage.getItem('po_coach_v1')); } catch (e) {}
    if (!state || !state.logs) { setStat('statGym', '0 sets', null, '0 kg movidos'); return; }

    const todayStr = calendarDateKey();
    let sets = 0, volume = 0;
    Object.keys(state.logs).forEach(exId => {
      (state.logs[exId] || []).forEach(l => {
        if (l && typeof l.date === 'string' && l.date.slice(0, 10) === todayStr) {
          sets++;
          volume += (Number(l.weight) || 0) * (Number(l.reps) || 0);
        }
      });
    });
    const unit = state.units === 'lb' ? 'lb' : 'kg';
    const hour = new Date().getHours();
    const status = sets > 0 ? 'good' : (hour >= 20 ? 'warn' : null);
    setStat('statGym', sets + ' sets', status, Math.round(volume).toLocaleString('es-ES') + ' ' + unit + ' movidos');
  }

  /* ============================================================
     PASOS DIARIOS — exact replica of gym.html's stepsLoad()/
     stepsLoadGoal() (gym:steps per-day object, gym:stepsGoal number).
     ============================================================ */
  function renderStepsStat() {
    let stepsData = {};
    try { stepsData = JSON.parse(localStorage.getItem('gym:steps')) || {}; } catch (e) {}
    let goal = 8000; // same STEPS_DEFAULT_GOAL fallback as gym.html
    try {
      const g = JSON.parse(localStorage.getItem('gym:stepsGoal'));
      if (typeof g === 'number' && g > 0) goal = g;
    } catch (e) {}
    const today = stepsData[calendarDateKey()] || 0;
    const hour = new Date().getHours();
    const status = today >= goal ? 'good' : (hour >= 20 && today < goal * 0.5 ? 'bad' : (today > 0 ? 'warn' : null));
    const pct = goal > 0 ? Math.round((today / goal) * 100) : 0;
    setStat('statSteps', today.toLocaleString('es-ES') + ' / ' + goal.toLocaleString('es-ES'), status, pct + '% de la meta');
  }

  /* ============================================================
     FINANZAS — Patrimonio (nw:history) + Gastos del mes (expenses).
     Same localStorage keys/shape as finance.html (appKey 'finance'):
     amounts are stored in CHF, nw_currency picks the display currency.
     Rates come from the same keyless open.er-api.com endpoint finance.html
     uses (fetched once per load, no polling — exchange rates don't move
     fast enough to justify it here).
     ============================================================ */
  let financeRates = { CHF: 1, USD: 1, EUR: 1, GBP: 1, ARS: 1 };
  function getFinanceCurrency() {
    let c = null;
    try { c = JSON.parse(localStorage.getItem('nw_currency')); } catch (e) {}
    return (typeof c === 'string' && financeRates[c] !== undefined) ? c : 'CHF';
  }
  function fmtFinanceMoney(amountCHF) {
    const symbol = getFinanceCurrency();
    const rate = financeRates[symbol] || 1;
    const num = (Number(amountCHF) || 0) * rate;
    return symbol + ' ' + num.toLocaleString('en-US', { minimumFractionDigits: num % 1 === 0 ? 0 : 2, maximumFractionDigits: 2 });
  }
  async function loadFinanceRates() {
    try {
      const res = await fetch('https://open.er-api.com/v6/latest/CHF');
      const json = await res.json();
      if (json && json.rates) {
        financeRates.USD = json.rates.USD || 1;
        financeRates.EUR = json.rates.EUR || 1;
        financeRates.GBP = json.rates.GBP || 1;
      }
    } catch (e) {}
    if (getFinanceCurrency() === 'ARS') {
      try {
        const res = await fetch('https://dolarapi.com/v1/dolares/oficial');
        const json = await res.json();
        if (json && json.venta) financeRates.ARS = json.venta;
      } catch (e) {}
    }
    renderFinanceStats();
  }

  function renderNetWorthStat() {
    let hist = [];
    try { const v = JSON.parse(localStorage.getItem('nw:history')); if (Array.isArray(v)) hist = v; } catch (e) {}
    if (!hist.length) { setStat('statNetWorth', '—', null, ''); return; }
    hist = hist.slice().sort((a, b) => a.t - b.t);
    const latest = hist[hist.length - 1].v;
    const cutoff = Date.now() - 30 * 24 * 60 * 60 * 1000;
    let baseline = hist[0].v;
    for (const p of hist) { if (p.t <= cutoff) baseline = p.v; else break; }
    const change = latest - baseline;
    const status = Math.abs(change) < 0.005 ? null : (change > 0 ? 'good' : 'bad');
    let sub = '';
    if (Math.abs(change) >= 0.005) {
      const sign = change > 0 ? '+' : '−';
      sub = Math.abs(baseline) < 0.5
        ? sign + fmtFinanceMoney(Math.abs(change)) + ' (30d)'
        : sign + Math.abs((change / Math.abs(baseline)) * 100).toFixed(1) + '% (30d)';
    }
    setStat('statNetWorth', fmtFinanceMoney(latest), status, sub);
  }

  // Sums expenses whose date (a plain YYYY-MM-DD, same as finance.html's
  // expenseInRange) falls in the given calendar year/month.
  function expenseMonthTotal(items, year, month, maxDay) {
    return items.reduce((s, it) => {
      if (!it.date) return s;
      const d = new Date(it.date + 'T00:00');
      if (isNaN(d) || d.getFullYear() !== year || d.getMonth() !== month) return s;
      if (maxDay != null && d.getDate() > maxDay) return s;
      return s + (Number(it.amount) || 0);
    }, 0);
  }
  function renderExpensesStat() {
    let items = [];
    try { const v = JSON.parse(localStorage.getItem('expenses')); if (Array.isArray(v)) items = v; } catch (e) {}
    if (!items.length) { setStat('statExpenses', '—', null, ''); return; }

    const now = new Date();
    const thisMonthTotal = expenseMonthTotal(items, now.getFullYear(), now.getMonth());
    // Compare month-to-date against the SAME day range last month (not
    // last month's full total) — the current month isn't over yet, so a
    // full-month comparison would always look artificially low.
    const prevMonthDate = new Date(now.getFullYear(), now.getMonth() - 1, 1);
    const prevMonthPace = expenseMonthTotal(items, prevMonthDate.getFullYear(), prevMonthDate.getMonth(), now.getDate());

    let status = null, sub = '';
    if (prevMonthPace > 0) {
      const ratio = thisMonthTotal / prevMonthPace;
      status = ratio <= 1.0 ? 'good' : ratio <= 1.25 ? 'warn' : 'bad';
      const pct = (ratio - 1) * 100;
      sub = (pct >= 0 ? '+' : '−') + Math.abs(pct).toFixed(0) + '% vs mes pasado';
    } else if (thisMonthTotal > 0) {
      sub = 'sin datos del mes pasado';
    }
    setStat('statExpenses', fmtFinanceMoney(thisMonthTotal), status, sub);
  }

  function renderFinanceStats() {
    renderNetWorthStat();
    renderExpensesStat();
  }
  loadFinanceRates();

  /* ============================================================
     CROSS-DEVICE WARM-UP — read-only pull for stats whose owning page
     (health.html/nutrition.html/gym.html) may never have been opened on
     THIS device. Those pages' own initCloudSync does the localStorage
     hydration on open; without ever opening them here, the keys above can
     read as empty even though the data exists in Supabase. select() only —
     no upsert, no realtime subscription — this page stays strictly
     read-only, same as the INIT comment below says.
     ============================================================ */
  const WARMUP_SUPABASE_URL = window.DASH_SUPABASE_URL || 'https://bkkjtxvneldsqwyhrhub.supabase.co';
  const WARMUP_SUPABASE_KEY = window.DASH_SUPABASE_KEY || 'sb_publishable_G8LqREPRDk0_tMEJNSFBxA_mIXNAnmT';
  let warmupSupa = null;
  if (window.supabase && WARMUP_SUPABASE_URL && WARMUP_SUPABASE_KEY &&
      WARMUP_SUPABASE_URL.indexOf('PASTE-') !== 0 && WARMUP_SUPABASE_KEY.indexOf('PASTE-') !== 0) {
    // persistSession/autoRefreshToken:false — see sync.js/gym.html. This
    // page is read-only by design and has no reason to touch the shared
    // auth session either.
    try { warmupSupa = window.supabase.createClient(WARMUP_SUPABASE_URL, WARMUP_SUPABASE_KEY, { auth: { persistSession: false, autoRefreshToken: false } }); } catch (e) {}
  }
  let lastWarmUpAt = 0;

  // Native localStorage.setItem — this page never calls initCloudSync, so
  // sync.js's setItem patch (which schedules a push) is never installed
  // here; writing directly is safe and correct.
  function applyIfDifferent(key, value) {
    if (value === undefined) return false;
    const incoming = JSON.stringify(value);
    if (localStorage.getItem(key) === incoming) return false;
    try { localStorage.setItem(key, incoming); return true; } catch (e) { return false; }
  }
  function warmUpRowData(res) {
    return (res.status === 'fulfilled' && res.value && res.value.data && res.value.data.data) || null;
  }
  function warmUpRecordRows(res) {
    return (res.status === 'fulfilled' && res.value && res.value.data) || null;
  }
  async function warmUpFromCloud() {
    if (!warmupSupa) return;
    lastWarmUpAt = Date.now();
    try {
      const [healthRes, coachRes, financeRes, cbRes, logRes, foodsRes, goalsRes, sleepRes] = await Promise.allSettled([
        warmupSupa.from('app_state').select('data').eq('key', 'health').maybeSingle(),
        warmupSupa.from('app_state').select('data').eq('key', 'po-coach').maybeSingle(),
        warmupSupa.from('app_state').select('data').eq('key', 'finance').maybeSingle(),
        // caloriesBurnedEntries/sleepEntries/nut:log/nut:foods/nut:goals used to
        // live on the 'health'/'nutrition' app_state rows above, but health.html
        // and nutrition.html migrated them onto DataLayer/records
        // (health_calories_burned, health_sleep, nutrition_log/foods/goals) —
        // those app_state rows stopped being written the moment each page
        // migrated, so warming up from them here was silently serving frozen
        // pre-migration data. Read straight from records instead (anon
        // read-only RLS policy added for this — see "anon read access
        // records" migration).
        warmupSupa.from('records').select('id,data').eq('collection', 'health_calories_burned'),
        warmupSupa.from('records').select('id,data').eq('collection', 'nutrition_log'),
        warmupSupa.from('records').select('id,data').eq('collection', 'nutrition_foods'),
        warmupSupa.from('records').select('id,data').eq('collection', 'nutrition_goals'),
        warmupSupa.from('records').select('id,data').eq('collection', 'health_sleep'),
      ]);
      const health = warmUpRowData(healthRes);
      const coach = warmUpRowData(coachRes);
      const finance = warmUpRowData(financeRes);
      const cbRows = warmUpRecordRows(cbRes);
      const logRows = warmUpRecordRows(logRes);
      const foodsRows = warmUpRecordRows(foodsRes);
      const goalsRows = warmUpRecordRows(goalsRes);
      const sleepRows = warmUpRecordRows(sleepRes);
      let changed = false;
      let currencyChanged = false;
      if (health) {
        changed = applyIfDifferent('po_water_v1', health.po_water_v1) || changed;
      }
      if (sleepRows) {
        // Matches health.html's own rowsToSleepEntries()/setLegacyMirror transform.
        changed = applyIfDifferent('sleepEntries', sleepRows.map((r) => Object.assign({}, r.data, { date: r.id }))) || changed;
      }
      if (cbRows) {
        // Matches health.html's own setLegacyMirror transform for CB_COL.
        changed = applyIfDifferent('caloriesBurnedEntries', cbRows.map((r) => ({ date: r.id, kcal: r.data.kcal, loggedAt: r.data.loggedAt }))) || changed;
      }
      if (logRows) {
        changed = applyIfDifferent('nut:log', logRows.map((r) => Object.assign({ id: r.id }, r.data))) || changed;
      }
      if (foodsRows) {
        changed = applyIfDifferent('nut:foods', foodsRows.map((r) => Object.assign({ id: r.id }, r.data))) || changed;
      }
      if (goalsRows) {
        const goalsRow = goalsRows.find((r) => r.id === 'main');
        if (goalsRow) changed = applyIfDifferent('nut:goals', goalsRow.data) || changed;
      }
      if (coach) {
        changed = applyIfDifferent('gym:steps', coach['gym:steps']) || changed;
        changed = applyIfDifferent('gym:stepsGoal', coach['gym:stepsGoal']) || changed;
        changed = applyIfDifferent('po_coach_v1', coach['po_coach_v1']) || changed;
      }
      if (finance) {
        changed = applyIfDifferent('nw:history', finance['nw:history']) || changed;
        changed = applyIfDifferent('expenses', finance.expenses) || changed;
        currencyChanged = applyIfDifferent('nw_currency', finance.nw_currency) || currencyChanged;
      }
      if (changed || currencyChanged) renderAllStats();
      // A currency change (e.g. picked ARS on another device) needs a rate
      // re-fetch, not just a re-render with the old (or default) rates.
      if (currencyChanged) loadFinanceRates();
    } catch (e) {}
  }

  /* ============================================================
     INIT — read-only, no writes, no initCloudSync (per spec).
     ============================================================ */
  function renderAllStats() {
    renderWaterStat();
    renderSleepStat();
    renderGoalsStat();
    renderCaloriesStat();
    renderGymStat();
    renderStepsStat();
    renderFinanceStats();
  }
  renderAllStats();
  warmUpFromCloud();

  // Other tabs/pages write these keys — refresh when they change or
  // when this tab regains focus, same convention as topbar.js.
  window.addEventListener('storage', renderAllStats);
  window.addEventListener('focus', renderAllStats);
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) return;
    renderAllStats();
    // Throttled re-pull — e.g. sleep logged on another device while this
    // tab sat in the background.
    if (Date.now() - lastWarmUpAt > 30000) warmUpFromCloud();
  });
})();
</script>
</body>
