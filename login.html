<!DOCTYPE html>
<html lang="en">
<head>
<script src="lock.js"></script>
<script src="/api/config"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<title>Sign in · Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root {
  --text-primary: #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary: #76746E;
  --danger: #FF6B6B;
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0; background: #050506; color: var(--text-secondary);
  font-family: var(--font); -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
  -webkit-text-size-adjust: 100%;
}
body {
  min-height: 100vh; position: relative; overflow-x: hidden;
  display: flex; align-items: center; justify-content: center;
  padding: max(28px, env(safe-area-inset-top)) 20px 40px;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background:
    radial-gradient(circle at 82% 14%, rgba(231,198,144,0.12), transparent 45%),
    radial-gradient(circle at 18% 90%, rgba(125,211,252,0.07), transparent 50%);
  filter: blur(40px); pointer-events: none; z-index: -2;
}
body::after {
  content: ''; position: fixed; inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px);
  background-size: 3px 3px; pointer-events: none; z-index: -1;
}
.card {
  width: 100%; max-width: 360px; background: rgba(255,255,255,0.04); border-radius: 16px; padding: 28px;
  backdrop-filter: blur(24px) saturate(1.2); -webkit-backdrop-filter: blur(24px) saturate(1.2);
  box-shadow: 0 12px 40px rgba(0,0,0,0.45);
}
h1 {
  margin: 0 0 6px; font-size: 24px; font-weight: 700; letter-spacing: -0.025em;
  background: linear-gradient(180deg, #FFFFFF 0%, #C7C4BC 120%);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent; color: transparent;
}
.sub { font-size: 12.5px; color: var(--text-tertiary); margin: 0 0 22px; line-height: 1.5; }
label { display: block; font-size: 10.5px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-tertiary); margin: 14px 0 6px; }
.gm-input {
  width: 100%; padding: 12px 14px; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px;
  background: rgba(0,0,0,0.28); color: var(--text-primary); font-family: inherit; font-size: 14px; outline: none;
  transition: border-color 0.2s, background 0.2s;
}
.gm-input::placeholder { color: var(--text-tertiary); }
.gm-input:focus { border-color: rgba(231,198,144,0.45); background: rgba(0,0,0,0.36); }
.gm-add {
  width: 100%; margin-top: 20px; padding: 13px 18px; border: 0; border-radius: 12px; font-family: inherit;
  font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; transition: transform 0.1s, filter 0.15s;
  background: linear-gradient(180deg, #FFFFFF 0%, #E8E5DD 100%); color: #0A0A0B;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), 0 2px 8px rgba(0,0,0,0.35), 0 8px 22px rgba(0,0,0,0.25);
}
.gm-add:hover { filter: brightness(1.06); transform: translateY(-1px); }
.gm-add:active { transform: translateY(0); }
.gm-add:disabled { opacity: 0.6; cursor: default; transform: none; filter: none; }
.error-msg {
  margin-top: 14px; font-size: 12.5px; color: var(--danger); line-height: 1.5; display: none;
}
.error-msg.on { display: block; }
</style>
</head>
<body>
<div class="card">
  <h1>Sign in</h1>
  <p class="sub">Log in to sync your data across devices.</p>
  <form id="loginForm">
    <label>Email</label>
    <input class="gm-input" id="email" type="email" placeholder="you@example.com" autocomplete="username" required>
    <label>Password</label>
    <input class="gm-input" id="password" type="password" placeholder="••••••••" autocomplete="current-password" required>
    <button class="gm-add" id="submitBtn" type="submit">Enter</button>
    <div class="error-msg" id="errorMsg"></div>
  </form>
</div>

<script>
(function () {
  'use strict';
  const $ = (id) => document.getElementById(id);

  const SUPABASE_URL = window.DASH_SUPABASE_URL || 'https://bkkjtxvneldsqwyhrhub.supabase.co';
  const SUPABASE_KEY = window.DASH_SUPABASE_KEY || 'sb_publishable_G8LqREPRDk0_tMEJNSFBxA_mIXNAnmT';

  function nextUrl() {
    const params = new URLSearchParams(location.search);
    const next = params.get('next');
    return next && next.startsWith('/') === false && next.indexOf('//') !== 0 ? next : 'index.html';
  }

  document.addEventListener('DOMContentLoaded', async function () {
    if (!window.supabase) {
      $('errorMsg').textContent = 'Could not load the auth library — check your connection and reload.';
      $('errorMsg').classList.add('on');
      return;
    }
    const supa = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Already signed in on this device — skip straight through.
    try {
      const { data } = await supa.auth.getSession();
      if (data && data.session) { location.href = nextUrl(); return; }
    } catch (e) { console.warn('[login] getSession failed', e); }

    $('loginForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      const email = $('email').value.trim();
      const password = $('password').value;
      $('errorMsg').classList.remove('on');
      $('submitBtn').disabled = true;
      $('submitBtn').textContent = 'Entering…';
      try {
        const { error } = await supa.auth.signInWithPassword({ email: email, password: password });
        if (error) throw error;
        location.href = nextUrl();
      } catch (err) {
        console.warn('[login] signInWithPassword failed', err);
        $('errorMsg').textContent = 'Could not sign in — check your email and password.';
        $('errorMsg').classList.add('on');
        $('submitBtn').disabled = false;
        $('submitBtn').textContent = 'Enter';
      }
    });
  });
})();
</script>
</body>
</html>
