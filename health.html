<!DOCTYPE html>
<html lang="en">
<head>
<script src="lock.js"></script>
<script src="/api/config"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<meta name="color-scheme" content="dark">
<title>Health · Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>
<style>
:root {
  --bg: #050506;
  --bg-card: rgba(255, 255, 255, 0.04);

  --text-primary: #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary: #76746E;
  --text-quaternary: #4D4B47;

  --sleep-rem: #9FE8FF;
  --sleep-light: #7DD3FC;
  --sleep-deep: #1D4ED8;
  --sleep-total: #B91C1C;

  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: var(--bg);
  color: var(--text-secondary);
  font-family: var(--font);
  font-size: 15px; line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
body { min-height: 100vh; position: relative; overflow-x: hidden; }

body::before {
  content: ''; position: fixed; inset: 0;
  background:
    radial-gradient(60% 50% at 82% 14%, rgba(224, 118, 88, 0.16) 0%, transparent 60%),
    radial-gradient(50% 40% at 18% 90%, rgba(180, 180, 200, 0.06) 0%, transparent 60%);
  filter: blur(40px);
  pointer-events: none; z-index: 0;
  animation: drift 36s ease-in-out infinite alternate;
}
body::after {
  content: ''; position: fixed; inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px);
  background-size: 3px 3px;
  pointer-events: none; z-index: 1;
}
@keyframes drift { 0% { transform: translate(0, 0); } 100% { transform: translate(-2%, 2%); } }

main {
  position: relative; z-index: 2;
  max-width: 720px; margin: 0 auto;
  padding: 56px 20px 80px;
  padding-top: max(56px, env(safe-area-inset-top, 56px));
}

.section-title {
  font-family: var(--font-mono);
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--text-tertiary);
  margin: 0 4px 14px;
  display: flex; align-items: center; gap: 12px;
}
.section-title::before { content: '≡'; font-size: 14px; opacity: 0.5; }

.sleep-open-btn {
  display: flex; align-items: center; gap: 14px;
  margin: 0 0 24px;
  padding: 16px 18px;
  background: linear-gradient(135deg, rgba(125, 211, 252, 0.10), rgba(168, 162, 255, 0.08));
  border: 1px solid rgba(168, 162, 255, 0.18);
  border-radius: 16px;
  text-decoration: none; color: var(--text-primary);
  -webkit-tap-highlight-color: transparent;
  transition: background 0.15s, transform 0.10s;
}
.sleep-open-btn:hover {
  background: linear-gradient(135deg, rgba(125, 211, 252, 0.16), rgba(168, 162, 255, 0.14));
}
.sleep-open-btn:active { transform: scale(0.985); }
.sleep-open-icon {
  font-size: 22px; line-height: 1;
  filter: grayscale(20%);
}
.sleep-open-text { flex: 1; display: flex; flex-direction: column; gap: 2px; }
.sleep-open-title {
  font-size: 14px; font-weight: 700; letter-spacing: 0.02em;
}
.sleep-open-sub {
  font-size: 11px; font-weight: 500;
  color: var(--text-tertiary);
  font-family: var(--font-mono);
  letter-spacing: 0.08em; text-transform: uppercase;
}
.sleep-open-chevron {
  font-size: 22px; line-height: 1;
  color: var(--text-tertiary);
  font-weight: 300;
}

.water-embed { margin-top: 56px; }
.water-iframe {
  display: block;
  width: 100%;
  height: 880px;
  border: 0;
  background: transparent;
  border-radius: 16px;
  overflow: hidden;
  color-scheme: dark;
}
@media (max-width: 480px) {
  .water-embed { margin-top: 40px; }
  .water-iframe { height: 780px; }
}

.attribution {
  text-align: center; margin-top: 28px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text-quaternary);
}

@media (max-width: 600px) {
  main { padding: 40px 16px 60px; }
}

::selection { background: rgba(224, 118, 88, 0.3); color: var(--text-primary); }
::-webkit-scrollbar { width: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.08); border-radius: 999px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.15); }
</style>
</head>
<body>

<main>

  <!-- ===== Sleep card (manual entry — Whoop removed, Strava has no sleep API) ===== -->
  <style>
    .sleep-section { margin-bottom: 32px; }
    .sleep-card {
      padding: 22px 22px 18px;
      background: rgba(255,255,255,0.025);
      border-radius: 22px;
      box-shadow: 0 1px 0 0 rgba(255,255,255,0.06) inset, 0 12px 40px rgba(0,0,0,0.45), 0 1px 2px rgba(0,0,0,0.25);
    }
    /* Form */
    .sleep-form-row { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
    .sleep-field { flex: 1; min-width: 100px; display: flex; flex-direction: column; gap: 6px; }
    .sleep-field-label { font-size: 10px; font-weight: 700; letter-spacing: 0.10em; text-transform: uppercase; color: var(--text-tertiary); }
    .sleep-input { padding: 10px 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.08); background: rgba(0,0,0,0.28); color: var(--text-primary); font-family: inherit; font-size: 13.5px; outline: none; transition: border-color 0.18s; color-scheme: dark; }
    .sleep-input:focus { border-color: rgba(255,255,255,0.40); }
    .sleep-feeling-row { display: flex; gap: 6px; }
    .sleep-feeling-btn { flex: 1; padding: 8px 0; border-radius: 10px; border: 1px solid rgba(255,255,255,0.06); background: rgba(255,255,255,0.025); font-size: 18px; cursor: pointer; transition: background 0.15s, border-color 0.15s; }
    .sleep-feeling-btn:hover { background: rgba(255,255,255,0.05); }
    .sleep-feeling-btn.active { border-color: rgba(107,227,164,0.55); background: rgba(107,227,164,0.10); }
    .sleep-quality-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .sleep-quality-btn { flex: 1; min-width: 64px; padding: 9px 4px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.06); background: rgba(255,255,255,0.025); color: var(--text-secondary); font-family: inherit; font-size: 11px; font-weight: 600; text-align: center; cursor: pointer; transition: background 0.15s, border-color 0.15s, color 0.15s; }
    .sleep-quality-btn:hover { background: rgba(255,255,255,0.05); }
    .sleep-quality-btn.active { border-color: rgba(107,227,164,0.55); background: rgba(107,227,164,0.10); color: var(--text-primary); }
    .sleep-save-btn { width: 100%; margin-top: 4px; padding: 12px; border: 1px solid rgba(255,255,255,0.85); border-radius: 12px; background: linear-gradient(180deg, #FFF, #E8E5DD); color: #0A0A0B; font-family: inherit; font-size: 13.5px; font-weight: 700; cursor: pointer; box-shadow: inset 0 1px 0 rgba(255,255,255,0.55), 0 6px 20px rgba(0,0,0,0.30); transition: transform 0.12s; }
    .sleep-save-btn:hover { transform: translateY(-1px); }
    .sleep-save-status { text-align: center; font-size: 11.5px; color: var(--text-tertiary); min-height: 16px; margin-top: 8px; }
    /* Weekly line chart — 4 series (rem/light/deep/total), same stage
       colors as the legend. Lines break wherever a day has no value for
       that series, instead of interpolating across missing nights. */
    .sleep-week { margin-top: 22px; padding-top: 22px; border-top: 1px solid rgba(255,255,255,0.05); }
    /* Breaks the chart (not the form above, not the stats below) out of
       the page's 720px column on wide viewports so the 7 days get real
       breathing room. Capped well short of full-bleed. Mobile keeps the
       original narrow layout — .sleep-week-breakout/.sleep-week-inner are
       plain no-op wrappers below the breakpoint. */
    @media (min-width: 800px) {
      .sleep-week-breakout {
        position: relative; left: 50%; right: 50%;
        width: 100vw; margin-left: -50vw; margin-right: -50vw;
      }
      .sleep-week-inner {
        max-width: 1000px; margin: 0 auto; padding: 24px 32px;
        box-sizing: border-box; background: var(--bg-card);
        backdrop-filter: blur(24px) saturate(1.2);
        -webkit-backdrop-filter: blur(24px) saturate(1.2);
        border-radius: 18px; box-shadow: 0 12px 40px rgba(0,0,0,0.35);
      }
    }
    .sleep-week-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 20px; flex-wrap: wrap; gap: 8px; }
    .sleep-week-eye { font-size: 10px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-tertiary); }
    .sleep-week-legend { display: flex; gap: 12px; flex-wrap: wrap; }
    .sleep-leg-item { display: inline-flex; align-items: center; gap: 5px; font-size: 10.5px; color: var(--text-secondary); font-weight: 500; }
    .sleep-leg-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
    .sleep-leg-dot.d-rem { background: var(--sleep-rem); }
    .sleep-leg-dot.d-light { background: var(--sleep-light); }
    .sleep-leg-dot.d-deep { background: var(--sleep-deep); }
    .sleep-leg-dot.d-total { background: var(--sleep-total); }
    .sleep-week-empty { font-size: 12.5px; color: var(--text-tertiary); font-style: italic; text-align: center; padding: 20px 10px; }
    .sleep-week-chart-wrap { position: relative; }
    .sleep-week-svg { width: 100%; height: 800px; display: block; overflow: visible; }
    .sleep-week-svg.hidden { display: none; }
    .sleep-week-grid { stroke: rgba(255,255,255,0.06); stroke-width: 1; }
    .sleep-week-yaxis-label { font-size: 11px; fill: var(--text-tertiary); font-family: var(--font-mono); }
    .sleep-line-rem   { fill: none; stroke: var(--sleep-rem);   stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .sleep-line-light { fill: none; stroke: var(--sleep-light); stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .sleep-line-deep  { fill: none; stroke: var(--sleep-deep);  stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .sleep-line-total { fill: none; stroke: var(--sleep-total); stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
    .sleep-dot { cursor: pointer; }
    .sleep-dot-rem   { fill: var(--sleep-rem); }
    .sleep-dot-light { fill: var(--sleep-light); }
    .sleep-dot-deep  { fill: var(--sleep-deep); }
    .sleep-dot-total { fill: var(--sleep-total); stroke: var(--bg); stroke-width: 1; }
    /* Invisible larger circle behind each dot so mobile taps land reliably
       without making the visible marker itself bigger. */
    .sleep-dot-hit { fill: rgba(0,0,0,0.001); pointer-events: all; cursor: pointer; }
    .sleep-week-daylabel { font-size: 11px; fill: var(--text-tertiary); font-family: var(--font-mono); }
    .sleep-week-tooltip {
      position: absolute; display: none; pointer-events: none;
      transform: translate(-50%, calc(-100% - 10px));
      background: rgba(20,20,24,0.97); border: 1px solid rgba(255,255,255,0.14);
      color: var(--text-primary); font-size: 11px; font-weight: 700;
      font-family: var(--font-mono); padding: 5px 9px; border-radius: 8px;
      white-space: nowrap; box-shadow: 0 6px 18px rgba(0,0,0,0.45); z-index: 5;
    }
    /* Stats */
    .sleep-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-top: 18px; padding-top: 18px; border-top: 1px solid rgba(255,255,255,0.05); }
    .sleep-stat { background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.04); border-radius: 12px; padding: 12px 10px; text-align: center; }
    .sleep-stat-label { font-size: 9.5px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.12em; font-weight: 700; margin-bottom: 8px; }
    .sleep-stat-val { font-size: 20px; font-weight: 700; color: var(--text-primary); line-height: 1; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }
    @media (max-width:480px) { .sleep-form-row.sleep-form-row-3 { flex-wrap: wrap; } .sleep-stat-val { font-size: 17px; } }
  </style>
  <div class="sleep-section" id="sleep">
    <div class="section-title">Sleep</div>
    <div class="sleep-card">
      <div class="sleep-form-row">
        <label class="sleep-field">
          <span class="sleep-field-label">Date</span>
          <input type="date" id="sleepDate" class="sleep-input">
        </label>
      </div>
      <div class="sleep-form-row">
        <label class="sleep-field">
          <span class="sleep-field-label">Bedtime</span>
          <input type="time" id="sleepBedTime" class="sleep-input">
        </label>
        <label class="sleep-field">
          <span class="sleep-field-label">Wake time</span>
          <input type="time" id="sleepWakeTime" class="sleep-input">
        </label>
      </div>
      <div class="sleep-form-row sleep-form-row-3">
        <label class="sleep-field">
          <span class="sleep-field-label">REM (hours)</span>
          <input type="number" min="0" step="0.1" id="sleepRem" class="sleep-input" placeholder="optional">
        </label>
        <label class="sleep-field">
          <span class="sleep-field-label">Light (hours)</span>
          <input type="number" min="0" step="0.1" id="sleepLight" class="sleep-input" placeholder="optional">
        </label>
        <label class="sleep-field">
          <span class="sleep-field-label">Deep (hours)</span>
          <input type="number" min="0" step="0.1" id="sleepDeep" class="sleep-input" placeholder="optional">
        </label>
      </div>
      <div class="sleep-form-row" style="flex-direction:column; align-items:stretch;">
        <span class="sleep-field-label">How did you wake up? (optional)</span>
        <div class="sleep-feeling-row" id="sleepFeelingRow">
          <button type="button" class="sleep-feeling-btn" data-v="1" aria-label="Terrible">😩</button>
          <button type="button" class="sleep-feeling-btn" data-v="2" aria-label="Rough">😕</button>
          <button type="button" class="sleep-feeling-btn" data-v="3" aria-label="OK">😐</button>
          <button type="button" class="sleep-feeling-btn" data-v="4" aria-label="Good">🙂</button>
          <button type="button" class="sleep-feeling-btn" data-v="5" aria-label="Great">😄</button>
        </div>
      </div>
      <div class="sleep-form-row" style="flex-direction:column; align-items:stretch;">
        <span class="sleep-field-label">Sleep quality (optional)</span>
        <div class="sleep-quality-row" id="sleepQualityRow">
          <button type="button" class="sleep-quality-btn" data-v="poor">Poor</button>
          <button type="button" class="sleep-quality-btn" data-v="bad">Bad</button>
          <button type="button" class="sleep-quality-btn" data-v="good">Good</button>
          <button type="button" class="sleep-quality-btn" data-v="excellent">Excellent</button>
        </div>
      </div>
      <button id="sleepSaveBtn" class="sleep-save-btn" type="button">Save</button>
      <div id="sleepSaveStatus" class="sleep-save-status"></div>

      <div class="sleep-week">
        <div class="sleep-week-breakout">
          <div class="sleep-week-inner">
            <div class="sleep-week-head">
              <span class="sleep-week-eye">This week</span>
              <div class="sleep-week-legend">
                <span class="sleep-leg-item"><span class="sleep-leg-dot d-rem"></span>REM</span>
                <span class="sleep-leg-item"><span class="sleep-leg-dot d-light"></span>Light</span>
                <span class="sleep-leg-item"><span class="sleep-leg-dot d-deep"></span>Deep</span>
                <span class="sleep-leg-item"><span class="sleep-leg-dot d-total"></span>Total</span>
              </div>
            </div>
            <div id="sleepWeekEmpty" class="sleep-week-empty" style="display:none">Aún no hay datos de sueño — registra tu primera noche arriba.</div>
            <div class="sleep-week-chart-wrap" id="sleepWeekChartWrap">
              <svg class="sleep-week-svg hidden" id="sleepWeekSvg" viewBox="0 0 300 400" preserveAspectRatio="none"></svg>
              <div class="sleep-week-tooltip" id="sleepWeekTooltip"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="sleep-stats" id="sleepStats">
        <div class="sleep-stat"><div class="sleep-stat-label">Avg sleep</div><div class="sleep-stat-val" id="sleepAvgHours">—</div></div>
        <div class="sleep-stat"><div class="sleep-stat-label">Avg REM</div><div class="sleep-stat-val" id="sleepAvgRem">—</div></div>
        <div class="sleep-stat"><div class="sleep-stat-label">Good Streak</div><div class="sleep-stat-val" id="sleepStreak">—</div></div>
      </div>
    </div>
  </div>
  <script>
  (function () {
    const SLEEP_KEY = 'sleepEntries';
    const $ = (id) => document.getElementById(id);

    function loadEntries() {
      try { const v = JSON.parse(localStorage.getItem(SLEEP_KEY)); return Array.isArray(v) ? v : []; }
      catch { return []; }
    }
    function saveEntries(list) { try { localStorage.setItem(SLEEP_KEY, JSON.stringify(list)); } catch {} }

    function pad2(n) { return String(n).padStart(2, '0'); }
    function dateKey(d) { return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate()); }
    function todayStr() { return dateKey(new Date()); }

    function minutesSinceMidnight(hhmm) {
      if (!hhmm) return null;
      const [h, m] = hhmm.split(':').map(Number);
      if (isNaN(h) || isNaN(m)) return null;
      return h * 60 + m;
    }
    // Hours asleep, handling the bedtime→wake crossing midnight.
    function durationHours(bedTime, wakeTime) {
      const b = minutesSinceMidnight(bedTime), w = minutesSinceMidnight(wakeTime);
      if (b == null || w == null) return null;
      let diff = w - b;
      if (diff <= 0) diff += 24 * 60;
      return diff / 60;
    }

    // Sleep quality — manually transcribed from the Xiaomi app's own
    // sleep analysis (separate from the "how did you wake up" feeling
    // picker above, which is the user's own subjective read). Ranked so
    // the Good Streak stat can require "Good" or better.
    const SLEEP_QUALITY_RANK = { poor: 0, bad: 1, good: 2, excellent: 3 };

    // ---------- Form ----------
    let selectedFeeling = null;
    let selectedQuality = null;
    $('sleepDate').value = todayStr();

    $('sleepFeelingRow').addEventListener('click', (e) => {
      const btn = e.target.closest('.sleep-feeling-btn');
      if (!btn) return;
      selectedFeeling = Number(btn.dataset.v);
      $('sleepFeelingRow').querySelectorAll('.sleep-feeling-btn').forEach(b => b.classList.toggle('active', b === btn));
    });
    $('sleepQualityRow').addEventListener('click', (e) => {
      const btn = e.target.closest('.sleep-quality-btn');
      if (!btn) return;
      selectedQuality = btn.dataset.v;
      $('sleepQualityRow').querySelectorAll('.sleep-quality-btn').forEach(b => b.classList.toggle('active', b === btn));
    });

    $('sleepSaveBtn').addEventListener('click', () => {
      const date = $('sleepDate').value || todayStr();
      const bedTime = $('sleepBedTime').value || null;
      const wakeTime = $('sleepWakeTime').value || null;
      const status = $('sleepSaveStatus');
      if (!bedTime || !wakeTime) { status.textContent = 'Bedtime and wake time are required.'; return; }

      const entry = {
        date, bedTime, wakeTime,
        remHours: $('sleepRem').value ? Number($('sleepRem').value) : null,
        lightHours: $('sleepLight').value ? Number($('sleepLight').value) : null,
        deepHours: $('sleepDeep').value ? Number($('sleepDeep').value) : null,
        feeling: selectedFeeling,
        quality: selectedQuality,
        loggedAt: new Date().toISOString(),
      };
      const entries = loadEntries();
      const idx = entries.findIndex(e => e.date === date);
      if (idx >= 0) entries[idx] = entry; else entries.push(entry);
      saveEntries(entries);

      status.textContent = 'Saved ✓';
      setTimeout(() => { status.textContent = ''; }, 1800);
      renderSleep();
    });

    // ---------- Weekly chart ----------
    // Current calendar week, Monday first. If today is e.g. Saturday, Sunday
    // still shows on the axis — it just has no data yet (same gap treatment
    // as any other day with nothing logged), it isn't hidden or trimmed.
    function currentWeekKeys() {
      const now = new Date();
      const dow = (now.getDay() + 6) % 7; // 0=Mon..6=Sun
      const monday = new Date(now); monday.setDate(now.getDate() - dow);
      const out = [];
      for (let i = 0; i < 7; i++) {
        const d = new Date(monday); d.setDate(monday.getDate() + i);
        out.push(dateKey(d));
      }
      return out;
    }
    function dayLabel(dstr) {
      const [y, m, d] = dstr.split('-').map(Number);
      return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][new Date(y, m - 1, d).getDay()];
    }

    // Builds one series' <path> (broken wherever a value is null, instead
    // of interpolating across a night with no data) plus its dots. Each
    // dot gets a paired invisible larger circle so mobile taps land
    // reliably without enlarging the visible marker.
    function buildSeriesLine(vals, kind, xAt, yAt) {
      let d = '', dots = '', started = false;
      vals.forEach((v, i) => {
        if (v == null) { started = false; return; }
        const x = xAt(i), y = yAt(v);
        d += (started ? ' L ' : 'M ') + x.toFixed(1) + ' ' + y.toFixed(1);
        started = true;
        const attrs = ' cx="' + x.toFixed(1) + '" cy="' + y.toFixed(1) + '" data-kind="' + kind + '" data-value="' + v + '"';
        dots += '<circle class="sleep-dot-hit" r="13"' + attrs + '></circle>'
          + '<circle class="sleep-dot sleep-dot-' + kind + '" r="4.5"' + attrs + '></circle>';
      });
      return (d ? '<path class="sleep-line-' + kind + '" d="' + d + '"></path>' : '') + dots;
    }

    const SLEEP_Y_MAX = 10, SLEEP_Y_STEP = 1;

    function hideSleepTooltip() {
      const tip = $('sleepWeekTooltip');
      if (tip) tip.style.display = 'none';
    }
    function showSleepTooltip(dotEl) {
      const tip = $('sleepWeekTooltip');
      const wrap = $('sleepWeekChartWrap');
      const kind = dotEl.getAttribute('data-kind');
      const value = Number(dotEl.getAttribute('data-value'));
      const label = kind.charAt(0).toUpperCase() + kind.slice(1);
      tip.textContent = label + ': ' + value.toFixed(1) + 'h';
      tip.style.display = 'block';
      const wrapRect = wrap.getBoundingClientRect();
      const dotRect = dotEl.getBoundingClientRect();
      tip.style.left = (dotRect.left + dotRect.width / 2 - wrapRect.left) + 'px';
      tip.style.top = (dotRect.top - wrapRect.top) + 'px';
    }
    function wireSleepDotEvents() {
      $('sleepWeekSvg').querySelectorAll('.sleep-dot, .sleep-dot-hit').forEach((dot) => {
        dot.addEventListener('mouseenter', () => showSleepTooltip(dot));
        dot.addEventListener('mouseleave', hideSleepTooltip);
        dot.addEventListener('click', (e) => { e.stopPropagation(); showSleepTooltip(dot); });
      });
    }
    // Tap/click anywhere outside a dot dismisses the tooltip — registered
    // once, not per render.
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.sleep-dot, .sleep-dot-hit')) hideSleepTooltip();
    });

    function renderWeekChart(entries) {
      const svg = $('sleepWeekSvg');
      const emptyEl = $('sleepWeekEmpty');
      const keys = currentWeekKeys();
      const byDate = {};
      entries.forEach(e => { byDate[e.date] = e; });

      if (!keys.some(k => byDate[k])) {
        svg.innerHTML = '';
        svg.classList.add('hidden');
        emptyEl.style.display = 'block';
        hideSleepTooltip();
        return;
      }
      emptyEl.style.display = 'none';
      svg.classList.remove('hidden');

      const series = {
        total: keys.map(k => byDate[k] ? durationHours(byDate[k].bedTime, byDate[k].wakeTime) : null),
        rem:   keys.map(k => (byDate[k] && byDate[k].remHours   != null) ? byDate[k].remHours   : null),
        light: keys.map(k => (byDate[k] && byDate[k].lightHours != null) ? byDate[k].lightHours : null),
        deep:  keys.map(k => (byDate[k] && byDate[k].deepHours  != null) ? byDate[k].deepHours  : null),
      };

      // Fixed 0–10h Y axis — never rescale.
      // W matches the ACTUAL rendered pixel width of the chart (not an
      // arbitrary fixed unit) so widening the container via the
      // .sleep-week-breakout CSS genuinely spreads the 7 days across
      // more space, instead of just stretching the same 300-unit grid
      // over a bigger box (which scales the dots/strokes right along
      // with the spacing and leaves them just as crowded, only bigger).
      // It also makes the X and Y scales 1:1, so dots render as true
      // circles instead of the sideways-stretched ellipses a mismatched
      // scale would produce.
      const n = keys.length;
      const W = svg.getBoundingClientRect().width || 600, H = 800;
      svg.setAttribute('viewBox', '0 0 ' + W.toFixed(1) + ' ' + H);
      const padLeft = 32, padRight = 14, padTop = 16, padBottom = 32;
      const plotW = W - padLeft - padRight;
      const plotH = H - padTop - padBottom;
      const xAt = (i) => padLeft + plotW * (n === 1 ? 0.5 : i / (n - 1));
      const yAt = (v) => padTop + plotH * (1 - Math.min(v, SLEEP_Y_MAX) / SLEEP_Y_MAX);

      let html = '';
      for (let v = 0; v <= SLEEP_Y_MAX; v += SLEEP_Y_STEP) {
        const y = yAt(v);
        html += '<line class="sleep-week-grid" x1="' + padLeft + '" y1="' + y.toFixed(1) + '" x2="' + (W - padRight).toFixed(1) + '" y2="' + y.toFixed(1) + '"></line>'
          + '<text class="sleep-week-yaxis-label" x="' + (padLeft - 8) + '" y="' + (y + 3).toFixed(1) + '" text-anchor="end">' + v + '</text>';
      }
      html += buildSeriesLine(series.rem, 'rem', xAt, yAt);
      html += buildSeriesLine(series.light, 'light', xAt, yAt);
      html += buildSeriesLine(series.deep, 'deep', xAt, yAt);
      html += buildSeriesLine(series.total, 'total', xAt, yAt);
      keys.forEach((k, i) => {
        html += '<text class="sleep-week-daylabel" x="' + xAt(i).toFixed(1) + '" y="' + (H - 10) + '" text-anchor="middle">' + dayLabel(k) + '</text>';
      });
      svg.innerHTML = html;
      wireSleepDotEvents();
    }

    // ---------- Stats ----------
    function renderStats(entries) {
      // Only days of the current calendar week that have already happened
      // carry an entry at all, so this naturally excludes both past gaps
      // and days later this week that haven't occurred yet — nothing
      // extra to special-case for "the future."
      const keys = currentWeekKeys();
      const recent = keys.map(k => entries.find(e => e.date === k)).filter(Boolean);
      const avgEl = $('sleepAvgHours'), remEl = $('sleepAvgRem'), streakEl = $('sleepStreak');

      if (!recent.length) { avgEl.textContent = '—'; remEl.textContent = '—'; }
      else {
        const durations = recent.map(e => durationHours(e.bedTime, e.wakeTime)).filter(v => v != null);
        avgEl.textContent = durations.length ? (durations.reduce((a, b) => a + b, 0) / durations.length).toFixed(1) + 'h' : '—';

        const withStages = recent.filter(e => e.remHours || e.lightHours || e.deepHours);
        if (withStages.length) {
          const remPcts = withStages.map(e => {
            const total = (e.remHours || 0) + (e.lightHours || 0) + (e.deepHours || 0);
            return total ? (100 * (e.remHours || 0) / total) : 0;
          });
          remEl.textContent = Math.round(remPcts.reduce((a, b) => a + b, 0) / remPcts.length) + '%';
        } else {
          remEl.textContent = '—';
        }
      }

      // Good Streak: consecutive days ending today rated Good or better
      // on sleep quality (from the Xiaomi app, transcribed by hand). A
      // day with no entry, or an entry with no quality logged, or a
      // Poor/Bad rating, all break the streak the same way.
      const byDateForStreak = {};
      entries.forEach(e => { byDateForStreak[e.date] = e; });
      let streak = 0;
      for (let i = 0; i < 365; i++) {
        const d = new Date(); d.setDate(d.getDate() - i);
        const e = byDateForStreak[dateKey(d)];
        const rank = e && e.quality ? SLEEP_QUALITY_RANK[e.quality] : -1;
        if (rank >= SLEEP_QUALITY_RANK.good) streak++; else break;
      }
      streakEl.textContent = streak + (streak === 1 ? ' day' : ' days');
    }

    function renderSleep() {
      const entries = loadEntries();
      renderWeekChart(entries);
      renderStats(entries);
    }

    renderSleep();
  })();
  </script>

  <!-- ===== Calories Burned (manual entry, replaces Daily Stack) ===== -->
  <style>
    .burned-card {
      background: rgba(255,255,255,0.025);
      border-radius: 22px;
      padding: 22px 22px 18px;
      box-shadow: 0 1px 0 0 rgba(255,255,255,0.06) inset, 0 12px 40px rgba(0,0,0,0.45), 0 1px 2px rgba(0,0,0,0.25);
    }
    .burned-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .burned-input {
      flex: 1; min-width: 140px; padding: 10px 12px; border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.08); background: rgba(0,0,0,0.28);
      color: var(--text-primary); font-family: inherit; font-size: 13.5px; outline: none;
      transition: border-color 0.18s; color-scheme: dark;
    }
    .burned-input:focus { border-color: rgba(255,255,255,0.40); }
    .burned-save-btn {
      padding: 10px 20px; border: 1px solid rgba(255,255,255,0.85); border-radius: 12px;
      background: linear-gradient(180deg, #FFF, #E8E5DD); color: #0A0A0B;
      font-family: inherit; font-size: 13.5px; font-weight: 700; cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.55), 0 6px 20px rgba(0,0,0,0.30);
      transition: transform 0.12s;
    }
    .burned-save-btn:hover { transform: translateY(-1px); }
    .burned-status { font-size: 12.5px; color: var(--text-tertiary); margin-top: 10px; min-height: 16px; }
  </style>
  <div class="section-title">Calories Burned</div>
  <div class="burned-card">
    <div class="burned-row">
      <input type="number" min="0" step="1" id="burnedInput" class="burned-input" placeholder="e.g. 2400">
      <button id="burnedSaveBtn" class="burned-save-btn" type="button">Save</button>
    </div>
    <div id="burnedStatus" class="burned-status"></div>
  </div>
  <script>
  (function () {
    const $ = (id) => document.getElementById(id);
    function pad2(n) { return String(n).padStart(2, '0'); }
    function todayDateKey() {
      const d = new Date();
      return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate());
    }
    function burnedKey() { return 'burned:' + todayDateKey(); }

    function render() {
      const v = localStorage.getItem(burnedKey());
      const status = $('burnedStatus');
      if (v != null && v !== '') {
        status.textContent = 'Logged: ' + v + ' kcal burned today';
        $('burnedInput').value = v;
      } else {
        status.textContent = 'Not logged yet today.';
      }
    }

    $('burnedSaveBtn').addEventListener('click', () => {
      const v = parseFloat($('burnedInput').value);
      if (!(v > 0)) return;
      localStorage.setItem(burnedKey(), String(Math.round(v)));
      render();
    });

    window.addEventListener('storage', (e) => { if (!e.key || e.key === burnedKey()) render(); });

    render();
  })();
  </script>
