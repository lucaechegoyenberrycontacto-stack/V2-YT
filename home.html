<style>
/* ===== Shared design tokens (copied from template.html — do not diverge) ===== */
:root {
  --text-primary: #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary: #76746E;
  --success: #6BE3A4;
  --warning: #F2C063;
  --danger:  #FF6B6B;
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: #050506;
  color: var(--text-secondary);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  -webkit-text-size-adjust: 100%;
}
body {
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
  padding: max(28px, env(safe-area-inset-top)) 20px 60px;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(circle at 82% 14%, rgba(224, 118, 88, 0.16), transparent 45%),
    radial-gradient(circle at 18% 90%, rgba(180, 180, 200, 0.06), transparent 50%);
  filter: blur(40px);
  pointer-events: none;
  z-index: -2;
  animation: drift 36s ease-in-out infinite alternate;
}
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px);
  background-size: 3px 3px;
  pointer-events: none;
  z-index: -1;
}
@keyframes drift {
  0%   { transform: translate3d(0,0,0); }
  100% { transform: translate3d(-22px, 14px, 0); }
}

.page { max-width: 1100px; margin: 0 auto; }

.section { margin-top: 8px; }
.section-title {
  font-size: 10.5px; font-weight: 700;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--text-tertiary);
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 12px;
}
.section-title::before {
  content: ''; width: 18px; height: 1px;
  background: var(--text-tertiary); opacity: 0.6;
}
.section-title::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(90deg, rgba(255,255,255,0.08), transparent);
}

.gm-card {
  position: relative;
  background: rgba(255, 255, 255, 0.04);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 14px;
  backdrop-filter: blur(24px) saturate(1.2);
  -webkit-backdrop-filter: blur(24px) saturate(1.2);
  box-shadow: 0 12px 40px rgba(0,0,0,0.45);
  overflow: hidden;
}

.stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 12px;
}
.stat {
  background: rgba(255,255,255,0.035);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px; padding: 14px;
  text-decoration: none; color: inherit; display: block;
  transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
}
.stat:hover { transform: translateY(-2px); border-color: rgba(255,255,255,0.14); }
.stat-num {
  font-size: 26px; font-weight: 700;
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.03em; color: var(--text-primary); line-height: 1;
  font-family: var(--font-mono);
}
.stat-label {
  margin-top: 6px;
  font-size: 10.5px; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--text-tertiary);
}
.stat-sub {
  margin-top: 4px;
  font-size: 10px; color: var(--text-tertiary);
}
/* Status tints — driven off --success/--warning/--danger only, no new colors. */
.stat.stat-good { border-color: rgba(107,227,164,0.35); background: rgba(107,227,164,0.07); }
.stat.stat-warn { border-color: rgba(242,192,99,0.35); background: rgba(242,192,99,0.07); }
.stat.stat-bad  { border-color: rgba(255,107,107,0.35); background: rgba(255,107,107,0.07); }
.stat.stat-good .stat-num { color: var(--success); }
.stat.stat-warn .stat-num { color: var(--warning); }
.stat.stat-bad  .stat-num { color: var(--danger); }

/* ===== Home-page-specific bits ===== */
.home-welcome {
  font-size: 11px; color: var(--text-tertiary);
  letter-spacing: 0.02em; margin: 0 0 18px;
}
.home-clock-row {
  display: flex; flex-wrap: wrap; align-items: center;
  justify-content: space-between; gap: 20px;
}
.home-clock-block { min-width: 200px; }
.home-clock {
  font-family: var(--font-mono); font-size: 44px; font-weight: 700;
  color: var(--text-primary); letter-spacing: -0.02em; line-height: 1;
  font-variant-numeric: tabular-nums;
}
.home-date {
  margin-top: 8px; font-size: 13px; color: var(--text-secondary);
}
.home-quote-block {
  flex: 1; min-width: 220px; max-width: 440px;
  padding-left: 20px; border-left: 1px solid rgba(255,255,255,0.08);
}
.home-quote {
  font-size: 14px; font-style: italic; color: var(--text-secondary); line-height: 1.5;
}
.home-quote-author {
  margin-top: 8px; font-size: 10.5px; font-weight: 700;
  letter-spacing: 0.10em; text-transform: uppercase; color: var(--text-tertiary);
}
@media (max-width: 560px) {
  .home-clock { font-size: 34px; }
  .home-quote-block { border-left: none; border-top: 1px solid rgba(255,255,255,0.08); padding-left: 0; padding-top: 16px; }
}
@media (max-width: 480px) {
  body { padding: max(20px, env(safe-area-inset-top)) 14px 50px; }
  .gm-card { padding: 16px; }
}
</style>
</head>

<script>

    const ss = String(now.getSeconds()).padStart(2, '0');
    $('homeClock').textContent = hh + ':' + mm + ':' + ss;
    const dateStr = now.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
    $('homeDate').textContent = dateStr.charAt(0).toUpperCase() + dateStr.slice(1);
  }

  function showRandomQuote() {
    const q = STOIC_QUOTES[Math.floor(Math.random() * STOIC_QUOTES.length)];
    $('homeQuoteText').textContent = '"' + q.t + '"';
    $('homeQuoteAuthor').textContent = '— ' + q.a;
  }
  showRandomQuote();

  /* ============================================================
     SHARED DATE HELPERS — same formulas as topbar.js / health.html
     ============================================================ */
  function pad2(n) { return String(n).padStart(2, '0'); }
  function calendarDateKey(d) {
    d = d || new Date();
    return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate());
  }
  // Goals' day rolls over at 6 AM, not midnight — exact replica of
  // topbar.js activeDateKey().
  function activeDateKey() {
    const now = new Date();
    const d = new Date(now);
    if (now.getHours() < 6) d.setDate(d.getDate() - 1);
    return calendarDateKey(d);
  }

  function setStat(id, text, status, subText) {
    const el = $(id);
    el.className = 'stat' + (status ? ' stat-' + status : '');
    $(id + 'Num').textContent = text;
    if (subText !== undefined) { const sub = $(id + 'Sub'); if (sub) sub.textContent = subText; }
  }

  /* ============================================================
     AGUA — exact replica of topbar.js getWaterProgress() + classifyStatus()
     ============================================================ */
  function getWaterProgress() {
    let state = null;
    try { state = JSON.parse(localStorage.getItem('po_water_v1')); } catch (e) {}
    if (!state) return { done: 0, total: 0 };
    const todayKey = calendarDateKey();
    const done = (state.logs || {})[todayKey] || 0;
    const p = state.profile || { weightKg: 75 };
    const wKg = state.weightUnit === 'lb' ? (p.weightKg || 0) / 2.20462 : (p.weightKg || 0);
    const base = wKg * 35;
    const exercise = (p.activityHrsPerWeek || 0) / 7 * 500;
    const caffeine = Math.max(0, (state.caffeineMgPerDay || 0) - 200) * 1.5;
    const subs = (state.substances || []).reduce((s, x) => {
      const dose = (x && x.dose != null ? x.dose : (x && x.defaultDose)) || 0;
      return s + Math.max(0, dose * ((x && x.mlPerUnit) || 0));
    }, 0);
    let adjust = 0;
    if (p.sex === 'm') adjust += 200;
    if ((p.age || 0) >= 50) adjust += 100;
    const totalMl = base + exercise + caffeine + subs + adjust;
    let unitVol;
    if (state.unit === 'glass') unitVol = state.glassMl || 250;
    else if (state.unit === 'oz') unitVol = 30;
    else if (state.unit === 'ml') unitVol = 1;
    else unitVol = state.bottleMl || 500;
    const total = Math.max(1, Math.ceil(totalMl / unitVol));
    return { done, total };
  }
  function classifyWaterStatus(done, total) {
    if (total === 0) return 'idle';
    if (done >= total) return 'good';
    if (done >= total * 0.5) return 'warn';
    const h = new Date().getHours();
    if (h >= 18 && done < total * 0.5) return 'miss';
    return 'warn';
  }
  function renderWaterStat() {
    const w = getWaterProgress();
    const kind = classifyWaterStatus(w.done, w.total);
    const status = kind === 'good' ? 'good' : kind === 'miss' ? 'bad' : kind === 'warn' ? 'warn' : null;
    setStat('statWater', (w.total ? w.done + '/' + w.total : '0/0'), status);
  }

  /* ============================================================
     SUEÑO — exact replica of health.html dateKey()/durationHours()
     ============================================================ */
  function minutesSinceMidnight(hhmm) {
    if (!hhmm) return null;
    const parts = hhmm.split(':').map(Number);
    const h = parts[0], m = parts[1];
    if (isNaN(h) || isNaN(m)) return null;
    return h * 60 + m;
  }
  function durationHours(bedTime, wakeTime) {
    const b = minutesSinceMidnight(bedTime), w = minutesSinceMidnight(wakeTime);
    if (b == null || w == null) return null;
    let diff = w - b;
    if (diff <= 0) diff += 24 * 60;
    return diff / 60;
  }
  function renderSleepStat() {
    let entries = [];
    try { const v = JSON.parse(localStorage.getItem('sleepEntries')); if (Array.isArray(v)) entries = v; } catch (e) {}
    if (!entries.length) { setStat('statSleep', '—', null, ''); return; }

    const todayKey = calendarDateKey();
    let entry = entries.find(e => e.date === todayKey);
    let isLastNight = false;
    if (!entry) {
      entry = entries.slice().sort((a, b) => (a.date < b.date ? 1 : -1))[0];
      isLastNight = true;
    }
    const hours = entry ? durationHours(entry.bedTime, entry.wakeTime) : null;
    if (hours == null) { setStat('statSleep', '—', null, ''); return; }

    const status = hours >= 7 ? 'good' : hours >= 6 ? 'warn' : 'bad';
    setStat('statSleep', hours.toFixed(1) + 'h', status, isLastNight ? '(anoche)' : '');
  }

  /* ============================================================
     GOALS DE HOY — exact replica of topbar.js getGoalsProgress()
     ============================================================ */
  function renderGoalsStat() {
    const key = 'goals:' + activeDateKey();
    let goals = [];
    try { goals = JSON.parse(localStorage.getItem(key)) || []; } catch (e) {}
    const total = Array.isArray(goals) ? goals.length : 0;
    const done = total ? goals.filter(g => g && g.done).length : 0;
    const status = total === 0 ? null : (done === total ? 'good' : (done > 0 ? 'warn' : null));
    setStat('statGoals', done + '/' + total, status);
  }

  /* ============================================================
     CALORÍAS — replicates nutrition.html's todaysLog()/macrosFor()
     (entries store {foodId, qty} items, not a raw kcal field, so
     kcal has to be looked up per-food same as nutrition.html does)
     plus health.html's burned:YYYY-MM-DD offset.
     ============================================================ */
  function kcalForItem(foods, foodId, qty) {
    const f = foods.find(x => x.id === foodId);
    if (!f) return 0;
    const scale = f.unit === 'unit' ? qty : qty / 100;
    return (f.kcal || 0) * scale;
  }
  function renderCaloriesStat() {
    let log = [], foods = [], goals = null;
    try { log = JSON.parse(localStorage.getItem('nut:log')) || []; } catch (e) {}
    try { foods = JSON.parse(localStorage.getItem('nut:foods')) || []; } catch (e) {}
    try { goals = JSON.parse(localStorage.getItem('nut:goals')); } catch (e) {}
    const goalKcal = (goals && goals.kcal) || 2200; // same fallback as nutrition.html's DEFAULT_GOALS.kcal

    const midnight = new Date(); midnight.setHours(0, 0, 0, 0);
    const todaysEntries = log.filter(l => l.ts >= midnight.getTime());
    let consumed = 0;
    todaysEntries.forEach(entry => {
      (entry.items || []).forEach(it => { consumed += kcalForItem(foods, it.foodId, it.qty); });
    });

    let burned = 0;
    const bv = localStorage.getItem('burned:' + calendarDateKey());
    if (bv != null && bv !== '') { const n = parseFloat(bv); if (!isNaN(n)) burned = n; }

    const net = Math.round(consumed - burned);
    const ratio = goalKcal > 0 ? net / goalKcal : 0;
    const hour = new Date().getHours();
    let status;
    if (ratio >= 0.9 && ratio <= 1.1) status = 'good';
    else if (ratio > 1.25) status = 'bad';
    else if (ratio < 0.5 && hour >= 20) status = 'bad';
    else status = 'warn';

    setStat('statCalories', net + ' / ' + goalKcal + ' kcal', status);
  }

  /* ============================================================
     ACTIVIDAD FÍSICA — exact replica of gym.html's log shape
     (state.logs[exerciseId] = [{date, weight, reps}, ...])
     ============================================================ */
  function renderGymStat() {
    let state = null;
    try { state = JSON.parse(localStorage.getItem('po_coach_v1')); } catch (e) {}
    if (!state || !state.logs) { setStat('statGym', '0 sets', null, '0 kg movidos'); return; }

    const todayStr = calendarDateKey();
    let sets = 0, volume = 0;
    Object.keys(state.logs).forEach(exId => {
      (state.logs[exId] || []).forEach(l => {
        if (l && typeof l.date === 'string' && l.date.slice(0, 10) === todayStr) {
          sets++;
          volume += (Number(l.weight) || 0) * (Number(l.reps) || 0);
        }
      });
    });
    const unit = state.units === 'lb' ? 'lb' : 'kg';
    const hour = new Date().getHours();
    const status = sets > 0 ? 'good' : (hour >= 20 ? 'warn' : null);
    setStat('statGym', sets + ' sets', status, Math.round(volume).toLocaleString('es-ES') + ' ' + unit + ' movidos');
  }

  /* ============================================================
     INIT — read-only, no writes, no initCloudSync (per spec).
     ============================================================ */
  function renderAllStats() {
    renderWaterStat();
    renderSleepStat();
    renderGoalsStat();
    renderCaloriesStat();
    renderGymStat();
  }
  renderAllStats();

  // Other tabs/pages write these keys — refresh when they change or
  // when this tab regains focus, same convention as topbar.js.
  window.addEventListener('storage', renderAllStats);
  window.addEventListener('focus', renderAllStats);
  document.addEventListener('visibilitychange', () => { if (!document.hidden) renderAllStats(); });
})();
</script>
</body>
</html>
